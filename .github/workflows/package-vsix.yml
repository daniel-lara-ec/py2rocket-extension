name: Package VSIX

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Get version
        id: version
        run: echo "VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Check if release tag exists
        id: release_check
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          git fetch --tags --force
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
            echo "Release $TAG ya existe. Se omitirá creación de release."
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Package extension
        run: |
          mkdir -p dist
          npx @vscode/vsce package -o dist/py2rocket-extension-${{ steps.version.outputs.VERSION }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: py2rocket-extension-vsix
          path: "dist/py2rocket-extension-*.vsix"
          if-no-files-found: error

      - name: Create GitHub Release
        if: steps.release_check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: "dist/py2rocket-extension-*.vsix"
